<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接住午覺大作戰 🛌 — 小小帶我魯</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream:#FFF8F0; --card-bg:#FFFFFF;
            --coral:#FF7F5C; --coral-light:#FFEEE8; --coral-dark:#E8623B;
            --sun:#FFD166; --sun-light:#FFF8DC;
            --sage:#6DBE8C; --sage-light:#E8F6EE;
            --lavender:#A78BFA; --lav-light:#F0EBFF;
            --sky:#5BC0EB; --pink:#FF9BC1;
            --text:#3A3A3A; --text-soft:#7A7A7A; --border:#F0E6DC;
            --radius:20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(circle at 20% 0%, #FFF0E6 0%, var(--cream) 55%);
            color: var(--text);
            font-family:'Noto Sans TC','Nunito',sans-serif;
            min-height:100vh;
            display:flex; flex-direction:column; align-items:center;
            padding: 22px 16px 50px;
        }

        /* top bar */
        .topbar { width:100%; max-width:920px; display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
        .back-link {
            text-decoration:none; color:var(--coral); font-weight:800; font-size:.92rem;
            background:#fff; border:1.5px solid var(--coral-light); padding:8px 18px; border-radius:100px;
            transition: transform .2s, box-shadow .2s;
        }
        .back-link:hover { transform: translateX(-3px); box-shadow:0 6px 18px rgba(255,127,92,.25); }
        .brand { font-weight:900; color:var(--coral); font-size:1.05rem; letter-spacing:-.3px; }

        .title-row { text-align:center; margin-bottom:14px; }
        .title-row h1 { font-size: clamp(1.8rem,6vw,2.8rem); font-weight:900; color:var(--coral); letter-spacing:-.5px; }
        .title-row p { color:var(--text-soft); font-size:.92rem; margin-top:4px; }

        /* HUD */
        .hud {
            width:100%; max-width:920px;
            display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
            margin-bottom:12px;
        }
        .hud-chip {
            background:#fff; border:1.5px solid var(--border); border-radius:14px;
            padding:8px 16px; font-weight:800; font-size:.92rem; min-width:84px; text-align:center;
        }
        .hud-chip small { display:block; font-size:.62rem; font-weight:700; color:var(--text-soft); letter-spacing:1px; text-transform:uppercase; }
        .hud-chip .big { font-size:1.15rem; }
        #hudMult.hot { color:var(--coral); animation: mult-pop .3s ease; }
        @keyframes mult-pop { 0%{transform:scale(1.4);} 100%{transform:scale(1);} }
        #hudLives { letter-spacing:2px; }

        /* power badges */
        .powers { width:100%; max-width:920px; display:flex; gap:8px; justify-content:center; min-height:30px; margin-bottom:8px; }
        .power-badge {
            display:flex; align-items:center; gap:6px; font-size:.8rem; font-weight:800;
            border-radius:100px; padding:4px 12px; color:#fff;
        }
        .power-badge.zen { background:var(--sky); }
        .power-badge.magnet { background:var(--lavender); }
        .power-badge.lucky { background:var(--sage); }
        .power-badge .pbar { width:36px; height:5px; border-radius:5px; background:rgba(255,255,255,.5); overflow:hidden; }
        .power-badge .pbar > i { display:block; height:100%; background:#fff; }

        /* stage */
        .stage { position:relative; width:100%; max-width:920px; }
        #game {
            display:block; width:100%; border-radius:var(--radius);
            background: linear-gradient(180deg,#FFF8DC 0%, #FFEEE8 70%, #FFE4D6 100%);
            border:2px solid var(--border); touch-action:none; cursor:none;
            box-shadow:0 10px 40px rgba(255,127,92,.15);
        }
        #game.zenmode { filter: hue-rotate(-18deg) saturate(.85); }

        /* overlays */
        .overlay {
            position:absolute; inset:0; border-radius:var(--radius);
            background:rgba(58,42,38,.55); backdrop-filter:blur(3px);
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            text-align:center; color:#fff; padding:24px; gap:6px;
        }
        .overlay.hidden { display:none; }
        .overlay h2 { font-size: clamp(1.6rem,5vw,2.4rem); font-weight:900; }
        .overlay p { font-size:.95rem; opacity:.92; max-width:440px; line-height:1.7; }
        .overlay .big-emoji { font-size:3.4rem; }
        .overlay .final-score { font-size:2.6rem; font-weight:900; color:var(--sun); }
        .overlay .stat-row { display:flex; gap:22px; margin:6px 0 4px; font-size:.9rem; opacity:.9; }
        .overlay .stat-row b { display:block; font-size:1.3rem; color:#fff; }
        .play-btn {
            background:var(--coral); color:#fff; border:none; cursor:pointer; font-family:inherit;
            font-weight:800; font-size:1.05rem; padding:14px 36px; border-radius:100px; margin-top:10px;
            transition: transform .2s, box-shadow .2s; box-shadow:0 6px 22px rgba(0,0,0,.25);
        }
        .play-btn:hover { transform: translateY(-3px) scale(1.03); }
        .legend { display:flex; flex-wrap:wrap; gap:14px 22px; justify-content:center; margin-top:10px; font-size:.84rem; }
        .legend span { background:rgba(255,255,255,.14); padding:5px 12px; border-radius:100px; }

        /* controls hint + mute */
        .footrow { width:100%; max-width:920px; display:flex; align-items:center; justify-content:space-between; margin-top:14px; flex-wrap:wrap; gap:10px; }
        .hint { font-size:.82rem; color:var(--text-soft); }
        .icon-btn {
            background:#fff; border:1.5px solid var(--border); border-radius:12px; cursor:pointer;
            font-size:1rem; padding:8px 14px; font-weight:700; color:var(--text);
        }
        .icon-btn:hover { border-color:var(--coral); }
    </style>
</head>
<body>

    <div class="topbar">
        <a href="nobody.html" class="back-link">← 回躺平導師計畫</a>
        <span class="brand">🛌 小小帶我魯</span>
    </div>

    <div class="title-row">
        <h1>接住午覺大作戰 🛌</h1>
        <p>接住會讓你放鬆的東西，閃開砸下來的工作。連擊越久、加倍越狂。</p>
    </div>

    <div class="hud">
        <div class="hud-chip"><small>得分</small><span class="big" id="hudScore">0</span></div>
        <div class="hud-chip"><small>倍率</small><span class="big" id="hudMult">x1</span></div>
        <div class="hud-chip"><small>連擊</small><span class="big" id="hudCombo">0</span></div>
        <div class="hud-chip"><small>時間</small><span class="big" id="hudTime">60</span></div>
        <div class="hud-chip"><small>生命</small><span class="big" id="hudLives">❤️❤️❤️</span></div>
        <div class="hud-chip"><small>最佳</small><span class="big" id="hudBest">0</span></div>
    </div>

    <div class="powers" id="powers"></div>

    <div class="stage">
        <canvas id="game" width="900" height="540"></canvas>

        <!-- start overlay -->
        <div class="overlay" id="startOverlay">
            <span class="big-emoji">🛏️</span>
            <h2>準備好躺平了嗎？</h2>
            <p>用滑鼠、觸控、或方向鍵 / A·D 移動枕頭。撐 60 秒，分數越高越放鬆。</p>
            <div class="legend">
                <span>🛌☕🍜🐱 +分</span>
                <span>🌟 金色午覺 大加分</span>
                <span>💤 慢動作</span>
                <span>🧲 磁鐵</span>
                <span>🍀 幸運加倍</span>
                <span>📊📧📞💼 別碰！</span>
            </div>
            <button class="play-btn" onclick="game.start()">開始遊戲 🚀</button>
        </div>

        <!-- game over overlay -->
        <div class="overlay hidden" id="overOverlay">
            <span class="big-emoji" id="overEmoji">🛌</span>
            <h2 id="overTitle">時間到！</h2>
            <div class="final-score" id="overScore">0</div>
            <div class="stat-row">
                <div>最高連擊<b id="overCombo">0</b></div>
                <div>躺平段位<b id="overRank">—</b></div>
                <div>歷史最佳<b id="overBest">0</b></div>
            </div>
            <p id="overMsg"></p>
            <button class="play-btn" onclick="game.start()">再玩一次 🔁</button>
        </div>

        <!-- pause overlay -->
        <div class="overlay hidden" id="pauseOverlay">
            <span class="big-emoji">⏸️</span>
            <h2>暫停中</h2>
            <p>休息也是遊戲的一部分。按 P 或下方按鈕繼續。</p>
            <button class="play-btn" onclick="game.togglePause()">繼續躺平</button>
        </div>
    </div>

    <div class="footrow">
        <span class="hint">🎮 移動：滑鼠 / 觸控 / ← → / A D &nbsp;·&nbsp; 暫停：P</span>
        <button class="icon-btn" id="muteBtn" onclick="game.toggleMute()">🔊 音效</button>
    </div>

    <script>
    const game = (function () {
        const cv = document.getElementById('game');
        const ctx = cv.getContext('2d');
        const W = cv.width, H = cv.height;

        const GOOD = ['🛌','☕','🍜','🐱','🌿','📺','🛋️','😴'];
        const BAD  = ['📊','📧','📞','💼','📈','⏰','📑','🔔'];
        const POWERS = ['💤','🧲','🍀'];
        const GOLDEN = '🌟';

        const BEST_KEY = 'tangping_catch_best';
        let best = +(localStorage.getItem(BEST_KEY) || 0);

        let items, particles, popups;
        let px, targetX, paddleW;
        let score, combo, bestCombo, mult, lives;
        let timeLeft, elapsed;
        let zenUntil, magnetUntil, luckyUntil;
        let shake, running, paused, raf, lastT, spawnT, countdownT;
        let keyLeft = false, keyRight = false;

        const now = () => (window.performance && performance.now) ? performance.now() : Date.now();
        const $ = id => document.getElementById(id);

        /* ---------- sound ---------- */
        let actx = null, muted = false;
        function ensureAudio() { if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } }
        function blip(freq, dur, type, vol) {
            if (muted || !actx) return;
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = type || 'sine'; o.frequency.value = freq;
            o.connect(g); g.connect(actx.destination);
            const t = actx.currentTime;
            g.gain.setValueAtTime(0.0001, t);
            g.gain.exponentialRampToValueAtTime(vol || 0.18, t + 0.01);
            g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
            o.start(t); o.stop(t + dur);
        }
        const sfx = {
            good() { blip(620 + Math.min(combo, 12) * 28, 0.12, 'triangle', 0.16); },
            golden() { [660, 880, 1100].forEach((f, i) => setTimeout(() => blip(f, 0.13, 'square', 0.13), i * 70)); },
            power() { [520, 780, 1040].forEach((f, i) => setTimeout(() => blip(f, 0.12, 'sine', 0.16), i * 55)); },
            bad() { blip(150, 0.28, 'sawtooth', 0.22); },
        };

        /* ---------- input ---------- */
        function setTarget(clientX) {
            const r = cv.getBoundingClientRect();
            targetX = Math.max(paddleW / 2, Math.min(W - paddleW / 2, (clientX - r.left) * (W / r.width)));
        }
        cv.addEventListener('mousemove', e => setTarget(e.clientX));
        cv.addEventListener('touchmove', e => { setTarget(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
        cv.addEventListener('touchstart', e => { setTarget(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keyLeft = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyRight = true;
            if (e.key === 'p' || e.key === 'P') togglePause();
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keyLeft = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyRight = false;
        });

        /* ---------- spawning ---------- */
        function spawn() {
            const lucky = now() < luckyUntil;
            const r = Math.random();
            let type, emoji;
            if (r < 0.07) { type = 'power'; emoji = POWERS[Math.floor(Math.random() * POWERS.length)]; }
            else if (r < (lucky ? 0.20 : 0.13)) { type = 'golden'; emoji = GOLDEN; }
            else if (!lucky && r < 0.45) { type = 'bad'; emoji = BAD[Math.floor(Math.random() * BAD.length)]; }
            else { type = 'good'; emoji = GOOD[Math.floor(Math.random() * GOOD.length)]; }
            const speedMul = 1 + Math.min(elapsed / 60000, 1) * 1.3;
            items.push({ x: 30 + Math.random() * (W - 60), y: -24, vy: (2.0 + Math.random() * 2.2) * speedMul, vx: 0, type, emoji, rot: 0, vr: (Math.random() - 0.5) * 0.1 });
        }

        /* ---------- effects ---------- */
        function burst(x, y, color, n) {
            for (let i = 0; i < n; i++) {
                const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 4;
                particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1, life: 1, color, r: 2 + Math.random() * 3 });
            }
        }
        function popup(x, y, text, color) { popups.push({ x, y, text, color, life: 1 }); }

        /* ---------- catch handling ---------- */
        function onCatch(it) {
            if (it.type === 'bad') {
                lives--; combo = 0; mult = 1; shake = 16; sfx.bad();
                burst(it.x, it.y, '#E8623B', 14);
                popup(it.x, it.y - 10, '💥', '#fff');
                if (lives <= 0) return end(false);
                return;
            }
            combo++;
            bestCombo = Math.max(bestCombo, combo);
            mult = Math.min(5, 1 + Math.floor(combo / 3));
            const luckyMul = now() < luckyUntil ? 2 : 1;
            let gain;
            if (it.type === 'golden') { gain = 5 * mult * luckyMul; sfx.golden(); burst(it.x, it.y, '#FFD166', 22); }
            else if (it.type === 'power') { gain = 2 * mult * luckyMul; applyPower(it.emoji); sfx.power(); burst(it.x, it.y, '#A78BFA', 18); }
            else { gain = 1 * mult * luckyMul; sfx.good(); burst(it.x, it.y, '#6DBE8C', 8); }
            score += gain;
            popup(it.x, it.y - 12, '+' + gain, it.type === 'golden' ? '#C89A00' : '#3A8C5C');
            flashMult();
        }
        function applyPower(emoji) {
            const t = now();
            if (emoji === '💤') { zenUntil = t + 5000; }
            else if (emoji === '🧲') { magnetUntil = t + 6000; }
            else if (emoji === '🍀') { luckyUntil = t + 6000; }
        }
        let multHot = 0;
        function flashMult() { multHot = 1; }

        /* ---------- main loop ---------- */
        function loop() {
            const t = now();
            const dt = Math.min(50, t - lastT); lastT = t;
            if (paused) { raf = requestAnimationFrame(loop); return; }

            elapsed += dt;
            countdownT += dt;
            if (countdownT >= 1000) { countdownT -= 1000; timeLeft--; if (timeLeft <= 0) { timeLeft = 0; return end(true); } }

            const zen = t < zenUntil, magnet = t < magnetUntil;
            cv.classList.toggle('zenmode', zen);

            // spawn (faster over time)
            spawnT += dt;
            const interval = Math.max(360, 700 - elapsed / 90);
            if (spawnT >= interval) { spawnT = 0; spawn(); }

            // paddle movement
            if (keyLeft) targetX -= 9;
            if (keyRight) targetX += 9;
            targetX = Math.max(paddleW / 2, Math.min(W - paddleW / 2, targetX));
            px += (targetX - px) * 0.25;

            // draw
            ctx.save();
            if (shake > 0) { ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake); shake *= 0.85; if (shake < 0.5) shake = 0; }
            ctx.clearRect(-20, -20, W + 40, H + 40);

            const paddleY = H - 44;
            const slow = zen ? 0.45 : 1;

            for (let i = items.length - 1; i >= 0; i--) {
                const it = items[i];
                it.y += it.vy * slow * (dt / 16);
                it.rot += it.vr;
                if (magnet && it.type !== 'bad' && it.y > H * 0.35) {
                    it.vx += Math.sign(px - it.x) * 0.35;
                    it.vx *= 0.92;
                    it.x += it.vx;
                }
                // catch band
                if (it.y > paddleY - 30 && it.y < paddleY + 20 && Math.abs(it.x - px) < paddleW / 2 + 8) {
                    items.splice(i, 1);
                    onCatch(it);
                    if (!running) { ctx.restore(); return; }
                    continue;
                }
                if (it.y > H + 36) { // missed
                    if (it.type === 'good' || it.type === 'golden') { combo = 0; mult = 1; }
                    items.splice(i, 1); continue;
                }
                ctx.save();
                ctx.translate(it.x, it.y); ctx.rotate(it.rot);
                ctx.font = (it.type === 'golden' ? 38 : 30) + 'px serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                if (it.type === 'golden') { ctx.shadowColor = '#FFD166'; ctx.shadowBlur = 18; }
                if (it.type === 'power') { ctx.shadowColor = '#A78BFA'; ctx.shadowBlur = 14; }
                ctx.fillText(it.emoji, 0, 0);
                ctx.restore();
            }

            // particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }
            // popups
            for (let i = popups.length - 1; i >= 0; i--) {
                const p = popups[i];
                p.y -= 0.8; p.life -= 0.02;
                if (p.life <= 0) { popups.splice(i, 1); continue; }
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color; ctx.font = '900 22px Nunito, sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(p.text, p.x, p.y);
                ctx.globalAlpha = 1;
            }

            // paddle
            ctx.font = '46px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            if (magnet) { ctx.shadowColor = '#A78BFA'; ctx.shadowBlur = 16; }
            ctx.fillText('🛏️', px, paddleY);
            ctx.shadowBlur = 0;

            ctx.restore();
            updateHUD(t);
            if (running) raf = requestAnimationFrame(loop);
        }

        /* ---------- HUD ---------- */
        function updateHUD(t) {
            $('hudScore').textContent = score;
            $('hudCombo').textContent = combo;
            $('hudTime').textContent = timeLeft;
            $('hudLives').textContent = '❤️'.repeat(Math.max(0, lives)) + '🤍'.repeat(Math.max(0, 3 - lives));
            $('hudBest').textContent = best;
            const mEl = $('hudMult');
            mEl.textContent = 'x' + mult;
            if (multHot) { mEl.classList.remove('hot'); void mEl.offsetWidth; mEl.classList.add('hot'); multHot = 0; }
            else if (mult === 1) mEl.classList.remove('hot');

            // power badges
            const wrap = $('powers');
            let html = '';
            if (t < zenUntil)    html += badge('zen', '💤 慢動作', (zenUntil - t) / 5000);
            if (t < magnetUntil) html += badge('magnet', '🧲 磁鐵', (magnetUntil - t) / 6000);
            if (t < luckyUntil)  html += badge('lucky', '🍀 幸運加倍', (luckyUntil - t) / 6000);
            wrap.innerHTML = html;
        }
        function badge(cls, label, frac) {
            return `<div class="power-badge ${cls}">${label}<span class="pbar"><i style="width:${Math.max(0, frac * 100)}%"></i></span></div>`;
        }

        /* ---------- start / end / pause ---------- */
        function start() {
            ensureAudio();
            items = []; particles = []; popups = [];
            paddleW = 92; px = W / 2; targetX = W / 2;
            score = 0; combo = 0; bestCombo = 0; mult = 1; lives = 3;
            timeLeft = 60; elapsed = 0;
            zenUntil = magnetUntil = luckyUntil = 0;
            shake = 0; spawnT = 0; countdownT = 0; multHot = 0;
            running = true; paused = false;
            $('startOverlay').classList.add('hidden');
            $('overOverlay').classList.add('hidden');
            $('pauseOverlay').classList.add('hidden');
            lastT = now();
            cancelAnimationFrame(raf);
            raf = requestAnimationFrame(loop);
        }

        function end(survived) {
            running = false; cancelAnimationFrame(raf);
            cv.classList.remove('zenmode');
            if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); }
            const rank = score >= 120 ? '躺平宗師 🧘' : score >= 70 ? '資深咸魚 🐟' : score >= 30 ? '躺平新手 🐣' : '卷寶寶 🐣';
            $('overEmoji').textContent = survived ? '🛌' : '💼';
            $('overTitle').textContent = survived ? '時間到！你超放鬆 ✨' : '工作淹沒了你 💼';
            $('overScore').textContent = score;
            $('overCombo').textContent = bestCombo;
            $('overRank').textContent = rank;
            $('overBest').textContent = best;
            $('overMsg').textContent = survived
                ? (score >= best ? '新紀錄！這就是躺平的最高境界。' : '放鬆得不錯，要不要再刷新一次紀錄？')
                : '別氣餒，工作本來就接不完。深呼吸，再躺一次。';
            $('overOverlay').classList.remove('hidden');
        }

        function togglePause() {
            if (!running) return;
            paused = !paused;
            $('pauseOverlay').classList.toggle('hidden', !paused);
        }

        function toggleMute() {
            muted = !muted;
            $('muteBtn').textContent = muted ? '🔇 靜音' : '🔊 音效';
        }

        // idle frame
        (function idle() {
            paddleW = 92; px = W / 2;
            ctx.clearRect(0, 0, W, H);
            ctx.font = '46px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('🛏️', W / 2, H - 44);
        })();
        $('hudBest').textContent = best;

        return { start, togglePause, toggleMute };
    })();
    </script>
</body>
</html>
